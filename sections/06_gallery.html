<section id="gallery" class="section bg-bone grain">
<style>
  .gal-head{ max-width:var(--maxw); margin-inline:auto; padding-inline:var(--gut);
    display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between;
    gap:1.2rem 2rem; margin-bottom:clamp(28px,4vw,52px); }
  .gal-head .gal-eyebrow{ color:var(--terra); margin-bottom:.9rem; display:block; }
  .gal-title{ margin:0; }
  .gal-lead{ max-width:34ch; color:var(--ink-70); margin:0; }

  /* Composed photographic grid: one large hero frame + one wide banner,
     surrounded by a consistent-gutter rhythm of equal cells. */
  .gal-grid{ max-width:var(--maxw); margin-inline:auto; padding-inline:var(--gut);
    display:grid; grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(3, clamp(160px,18vw,240px));
    grid-template-areas:
      "hero hero a    b"
      "hero hero c    d"
      "wide wide f    g";
    gap:clamp(12px,1.1vw,18px); }

  .gal-hero{ grid-area:hero; } .gal-a{ grid-area:a; } .gal-b{ grid-area:b; }
  .gal-c{ grid-area:c; } .gal-d{ grid-area:d; } .gal-wide{ grid-area:wide; }
  .gal-f{ grid-area:f; } .gal-g{ grid-area:g; }

  .gal-tile{ position:relative; overflow:hidden; border-radius:10px;
    border:2px solid var(--bone-2); background:var(--bone-2);
    box-shadow:0 1px 0 rgba(36,29,24,.04); margin:0; }
  .gal-tile::after{ content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(to top, rgba(36,29,24,.42) 0%, rgba(36,29,24,0) 42%);
    opacity:.55; transition:opacity .5s var(--ease); }
  /* Wrapper carries the hover zoom; the inner <img> is driven by data-img-parallax
     (engine sets an inline transform on it), so the two never fight. */
  .gal-imgwrap{ position:absolute; inset:0; overflow:hidden; border-radius:inherit;
    transform:scale(1.001); transition:transform 1.1s var(--ease); will-change:transform; }
  .gal-img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    display:block; transform:scale(1.01); filter:saturate(1.02) contrast(1.02);
    transition:transform 1.1s var(--ease), filter .6s var(--ease); will-change:transform; }
  .gal-cap{ position:absolute; left:0; right:0; bottom:0; z-index:2;
    padding:.85em 1em; color:var(--bone);
    font-family:var(--body); font-weight:700; text-transform:uppercase;
    letter-spacing:.16em; font-size:clamp(9px,.72vw,11px);
    transform:translateY(115%); opacity:0;
    transition:transform .5s var(--ease), opacity .45s var(--ease); }
  .gal-cap::before{ content:""; display:inline-block; width:18px; height:2px;
    background:var(--terra); margin-right:.7em; vertical-align:middle; }

  /* Hover zoom lives on the wrapper (won't clash with parallax's inline img transform);
     fall back to the img itself for tiles without a wrap. */
  .gal-tile:hover .gal-imgwrap,
  .gal-tile:focus-within .gal-imgwrap{ transform:scale(1.07); }
  .gal-tile:hover .gal-img,
  .gal-tile:focus-within .gal-img{ filter:saturate(1.08) contrast(1.04); }
  .gal-tile:hover::after,
  .gal-tile:focus-within::after{ opacity:.9; }
  .gal-tile:hover .gal-cap,
  .gal-tile:focus-within .gal-cap{ transform:translateY(0); opacity:1; }
  .gal-tile[data-tilt]{ transform-style:preserve-3d; }

  /* Tablets (and down): clean 2-column rhythm; hero + banner stay full-width anchors. */
  @media (max-width:900px){
    .gal-grid{ grid-template-columns:1fr 1fr; grid-template-rows:none;
      grid-auto-rows:clamp(150px,32vw,210px); grid-template-areas:none; }
    .gal-tile{ grid-area:auto; grid-column:span 1; grid-row:span 1; }
    .gal-hero{ grid-column:span 2; grid-row:span 2; }  /* hero stays the big frame */
    .gal-wide{ grid-column:span 2; }                    /* sunset stays a banner */
    .gal-cap{ transform:translateY(0); opacity:1; }      /* always show on touch */
    .gal-tile::after{ opacity:.8; }
  }
  /* Phones: single column, every frame full-bleed. */
  @media (max-width:520px){
    .gal-grid{ grid-template-columns:1fr; grid-auto-rows:clamp(200px,56vw,260px); }
    .gal-tile,.gal-hero,.gal-wide{ grid-column:span 1; grid-row:span 1; }
  }
</style>

  <div class="gal-head">
    <div>
      <span class="gal-eyebrow eyebrow" data-reveal="left">From the lane to the line-up</span>
      <h2 class="gal-title h-lg" data-split="words" data-split-stagger="60">The Gallery</h2>
    </div>
    <p class="gal-lead lead" data-reveal="right">Real rides, real light — scenes between the lane and the line-up on Sri Lanka's south coast.</p>
  </div>

  <div class="gal-grid" data-reveal-group>
    <figure class="gal-tile gal-hero" data-reveal="clip" data-img-parallax="0.10" data-tilt data-tilt-max="5">
      <div class="gal-imgwrap"><img class="gal-img" src="assets/img/photos/r6_river_sunset.webp" alt="River mouth glowing orange in the last light of sunset, palms in silhouette" loading="lazy"></div>
      <figcaption class="gal-cap">River mouth, last light</figcaption>
    </figure>

    <figure class="gal-tile gal-a" data-reveal="scale-up" data-img-parallax="0.14">
      <div class="gal-imgwrap"><img class="gal-img" src="assets/img/photos/r7_forest_stars.webp" alt="Tuk-tuk parked in the forest beneath a sky full of stars" loading="lazy"></div>
      <figcaption class="gal-cap">Under the stars</figcaption>
    </figure>

    <figure class="gal-tile gal-b" data-reveal="clip-up" data-img-parallax="0.09" data-tilt data-tilt-max="7">
      <div class="gal-imgwrap"><img class="gal-img" src="assets/img/mockups/07_tuktuk.webp" alt="Blue tuk-tuk at golden hour with the Tuk &amp; Tide door decal" loading="lazy"></div>
      <figcaption class="gal-cap">Door decal, golden hour</figcaption>
    </figure>

    <figure class="gal-tile gal-c" data-reveal="scale" data-img-parallax="0.16">
      <div class="gal-imgwrap"><img class="gal-img" src="assets/img/photos/r1_night_road.webp" alt="Tuk-tuk on a dark night road with taillights trailing behind" loading="lazy"></div>
      <figcaption class="gal-cap">Night road, taillights</figcaption>
    </figure>

    <figure class="gal-tile gal-d" data-reveal="scale-up" data-img-parallax="0.11">
      <div class="gal-imgwrap"><img class="gal-img" src="assets/img/photos/r2_moon.webp" alt="Full moon rising over the bay above a parked tuk-tuk" loading="lazy"></div>
      <figcaption class="gal-cap">Moonrise over the bay</figcaption>
    </figure>

    <figure class="gal-tile gal-wide" data-reveal="clip" data-img-parallax="0.08">
      <div class="gal-imgwrap"><img class="gal-img" src="assets/img/photos/r10_sunset_front.webp" alt="Front three-quarter view of the tuk-tuk at golden hour by the curb" loading="lazy"></div>
      <figcaption class="gal-cap">Golden hour at the curb</figcaption>
    </figure>

    <figure class="gal-tile gal-f" data-reveal="clip-up" data-img-parallax="0.15" data-tilt data-tilt-max="7">
      <div class="gal-imgwrap"><img class="gal-img" src="assets/img/photos/r9_muddy_moon.webp" alt="Tuk-tuk on a muddy back lane under a full moon" loading="lazy"></div>
      <figcaption class="gal-cap">Muddy lane, full moon</figcaption>
    </figure>

    <figure class="gal-tile gal-g" data-reveal="scale" data-img-parallax="0.12">
      <div class="gal-imgwrap"><img class="gal-img" src="assets/img/photos/r3_stall.webp" alt="Roadside fruit stall stop in warm afternoon light" loading="lazy"></div>
      <figcaption class="gal-cap">The fruit-stall stop</figcaption>
    </figure>
  </div>
</section>
