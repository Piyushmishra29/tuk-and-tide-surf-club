<section id="merch" class="section bg-bone2 grain">
<style>
  /* ===== 08 MERCH / shop-teaser — prefix .mr- ===== */
  .mr-wrap{ position:relative; z-index:1; }
  .mr-head{ max-width:640px; }
  .mr-head .rule{ margin:18px 0 22px; }
  .mr-ey{ color:var(--clay); }
  .mr-h{ margin-top:6px; color:var(--ink); }
  .mr-h .mr-amp{ color:var(--terra); -webkit-text-stroke:0; }
  .mr-sub{ margin-top:18px; max-width:48ch; color:var(--ink-70); }

  .mr-grid{ display:grid; grid-template-columns:1fr;
            gap:clamp(22px,2.8vw,40px); align-items:stretch;
            margin-top:clamp(40px,5vw,64px); }

  /* ---- sticker pile (terracotta panel) ---- */
  .mr-lab{ position:relative; border-radius:var(--r-lg); background:var(--terra);
           padding:clamp(36px,4vw,52px) clamp(24px,3vw,40px) clamp(60px,5vw,68px);
           box-shadow:0 24px 50px -28px rgba(36,29,24,.55); }
  .mr-lab::before{ content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none; opacity:.55;
           background:radial-gradient(120% 90% at 28% 10%, rgba(255,255,255,.18), transparent 58%); }
  .mr-lab-top{ position:relative; display:flex; align-items:baseline; justify-content:space-between;
           gap:14px; margin-bottom:clamp(14px,2vw,24px); }
  .mr-lab-t{ font-family:var(--marker); font-size:clamp(15px,1.5vw,21px); color:var(--bone); }
  .mr-lab-n{ font-family:var(--body); font-weight:700; letter-spacing:.18em; text-transform:uppercase;
           font-size:11px; color:rgba(239,227,208,.85); }

  .mr-pile{ position:relative; display:flex; flex-wrap:wrap; justify-content:center; align-items:center;
            gap:clamp(6px,1.4vw,18px); padding-top:8px; }
  .mr-stk{ width:clamp(90px,11vw,140px); flex:0 0 auto; position:relative; }
  .mr-stk-i{ display:flex; align-items:center; justify-content:center;
           transition:transform .5s var(--ease), filter .5s var(--ease);
           filter:drop-shadow(0 8px 16px rgba(36,29,24,.4)); will-change:transform; }
  .mr-stk-i img{ width:100%; height:auto; pointer-events:none; }
  .mr-stk:nth-child(1)  .mr-stk-i{ transform:translateY(8px); }
  .mr-stk:nth-child(2)  .mr-stk-i{ transform:translateY(-12px) scale(1.08); }
  .mr-stk:nth-child(3)  .mr-stk-i{ transform:translateY(14px); }
  .mr-stk:nth-child(4)  .mr-stk-i{ transform:translateY(-6px); }
  .mr-stk:nth-child(5)  .mr-stk-i{ transform:translateY(-2px) scale(1.06); }
  .mr-stk:nth-child(6)  .mr-stk-i{ transform:translateY(16px); }
  .mr-stk:nth-child(7)  .mr-stk-i{ transform:translateY(-10px); }
  .mr-stk:nth-child(8)  .mr-stk-i{ transform:translateY(10px) scale(1.05); }
  .mr-stk:nth-child(9)  .mr-stk-i{ transform:translateY(-14px); }
  .mr-stk:nth-child(10) .mr-stk-i{ transform:translateY(6px); }
  @media (prefers-reduced-motion:no-preference){
    @keyframes mr-float{
      0%,100%{ translate:0 0; }
      50%{ translate:0 -7px; }
    }
    .mr-stk-i{ animation:mr-float 6s ease-in-out infinite; }
    .mr-stk:nth-child(1)  .mr-stk-i{ animation-duration:6.2s; animation-delay:-0.4s; }
    .mr-stk:nth-child(2)  .mr-stk-i{ animation-duration:5.4s; animation-delay:-1.6s; }
    .mr-stk:nth-child(3)  .mr-stk-i{ animation-duration:6.8s; animation-delay:-0.9s; }
    .mr-stk:nth-child(4)  .mr-stk-i{ animation-duration:5.8s; animation-delay:-2.3s; }
    .mr-stk:nth-child(5)  .mr-stk-i{ animation-duration:6.5s; animation-delay:-1.1s; }
    .mr-stk:nth-child(6)  .mr-stk-i{ animation-duration:5.6s; animation-delay:-3.0s; }
    .mr-stk:nth-child(7)  .mr-stk-i{ animation-duration:6.9s; animation-delay:-0.6s; }
    .mr-stk:nth-child(8)  .mr-stk-i{ animation-duration:5.2s; animation-delay:-2.7s; }
    .mr-stk:nth-child(9)  .mr-stk-i{ animation-duration:6.4s; animation-delay:-1.9s; }
    .mr-stk:nth-child(10) .mr-stk-i{ animation-duration:5.9s; animation-delay:-0.2s; }
  }
  .mr-stk:hover{ z-index:5; }
  .mr-stk:hover .mr-stk-i{ animation-play-state:paused;
                 transform:translateY(-6px) scale(1.16);
                 filter:drop-shadow(0 14px 24px rgba(36,29,24,.5)); }
  .mr-lab-cap{ position:absolute; left:0; right:0; bottom:clamp(16px,1.8vw,22px); text-align:center;
           font-family:var(--script); font-size:clamp(14px,1.4vw,18px); color:var(--bone); }

  /* ---- price strip + CTA ---- */
  .mr-foot{ margin-top:clamp(26px,3vw,40px); display:flex; flex-wrap:wrap; align-items:center;
            justify-content:space-between; gap:clamp(18px,2.4vw,34px);
            border-top:1.5px solid rgba(36,29,24,.14); padding-top:clamp(22px,2.4vw,30px); }
  .mr-strip{ display:flex; flex-wrap:wrap; align-items:center; gap:clamp(10px,1.4vw,18px); }
  .mr-row-i{ display:inline-flex; align-items:baseline; gap:7px; }
  .mr-row-i b{ font-family:var(--anton); font-weight:400; font-size:clamp(15px,1.4vw,19px);
            letter-spacing:.02em; text-transform:uppercase; color:var(--ink); }
  .mr-row-i s{ text-decoration:none; font-family:var(--anton); font-size:clamp(15px,1.4vw,19px);
            color:var(--terra); }
  .mr-dot{ width:5px; height:5px; border-radius:50%; background:rgba(36,29,24,.3); }
  .mr-cta{ display:flex; align-items:center; gap:16px; }
  .mr-go{ font-family:var(--marker); font-size:14px; color:var(--clay); white-space:nowrap; }

  @media (max-width:900px){
    .mr-grid{ gap:24px; }
    .mr-stk{ width:clamp(82px,20vw,120px); }
  }
  @media (max-width:560px){
    .mr-foot{ flex-direction:column; align-items:flex-start; gap:22px; }
    .mr-cta{ flex-direction:column; align-items:flex-start; gap:12px; }
  }
</style>

  <div class="container mr-wrap">
    <div class="mr-head" data-reveal-group>
      <span class="eyebrow mr-ey" data-split="words">Take the club home</span>
      <h2 class="h-lg mr-h" data-reveal>The <span class="mr-amp">Shop</span></h2>

    </div>

    <div class="mr-grid">

      <div class="mr-lab" data-reveal="scale">
        <div class="mr-lab-top">

          <span class="mr-lab-n">~20 die-cut designs</span>
        </div>
        <div class="mr-pile" data-reveal-group>
          <span class="mr-stk" data-reveal="scale-up"><span class="mr-stk-i"><img src="assets/img/stickers/01_stamp_tuk.webp" alt="Tuk-tuk stamp sticker" loading="lazy"></span></span>
          <span class="mr-stk" data-reveal="scale-up"><span class="mr-stk-i"><img src="assets/img/stickers/05_sun_seal.webp" alt="Sun seal sticker" loading="lazy"></span></span>
          <span class="mr-stk" data-reveal="scale-up"><span class="mr-stk-i"><img src="assets/img/stickers/02_stamp_wave.webp" alt="Wave stamp sticker" loading="lazy"></span></span>
          <span class="mr-stk" data-reveal="scale-up"><span class="mr-stk-i"><img src="assets/img/stickers/17_stay_salty.webp" alt="Stay Salty sticker" loading="lazy"></span></span>
          <span class="mr-stk" data-reveal="scale-up"><span class="mr-stk-i"><img src="assets/img/stickers/04_groovy_srr.webp" alt="Groovy Surf Ride Repeat sticker" loading="lazy"></span></span>
          <span class="mr-stk" data-reveal="scale-up"><span class="mr-stk-i"><img src="assets/img/stickers/10_wordmark.webp" alt="Tuk &amp; Tide wordmark sticker" loading="lazy"></span></span>
          <span class="mr-stk" data-reveal="scale-up"><span class="mr-stk-i"><img src="assets/img/stickers/16_sunset.webp" alt="Sunset sticker" loading="lazy"></span></span>
          <span class="mr-stk" data-reveal="scale-up"><span class="mr-stk-i"><img src="assets/img/stickers/19_weligama.webp" alt="Weligama sticker" loading="lazy"></span></span>
          <span class="mr-stk" data-reveal="scale-up"><span class="mr-stk-i"><img src="assets/img/stickers/11_shaka.webp" alt="Shaka sticker" loading="lazy"></span></span>
          <span class="mr-stk" data-reveal="scale-up"><span class="mr-stk-i"><img src="assets/img/stickers/09_hibiscus.webp" alt="Hibiscus sticker" loading="lazy"></span></span>
        </div>
        <span class="mr-lab-cap">slap one on your board</span>
      </div>


    </div>

    <!-- price strip + CTA -->
    <div class="mr-foot">
      <div class="mr-strip" data-reveal>
        <span class="mr-row-i"><b>Sticker pack</b><s>$6</s></span>
        <span class="mr-dot"></span>
        <span class="mr-row-i"><b>Tee</b><s>$24</s></span>
        <span class="mr-dot"></span>
        <span class="mr-row-i"><b>Tote</b><s>$18</s></span>
      </div>
      <div class="mr-cta" data-reveal>
        <span class="mr-go">in stock &amp; ready to ship —</span>
        <a class="btn btn--primary" href="https://wa.me/94765550123" target="_blank" rel="noopener">
          DM to buy <span class="arr">&rarr;</span>
        </a>
      </div>
    </div>
  </div>
</section>
